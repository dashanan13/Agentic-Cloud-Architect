<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <base href="../" />
  <title>Canvas UI</title>
  <link rel="stylesheet" href="./CanvasScreen/styles.css" />
</head>

<body>

<div id="app">

<!-- HEADER -->
<div class="header">

  <!-- LEFT -->
  <div class="section">
    <a href="./index.html" class="icon-btn" title="Home" aria-label="Home">
      <img src="/Assets/Logo/logo-icon.jpg" style="height: 36px; width: 36px; object-fit: contain; border-radius: 0;" />
    </a>
    <span id="left-canvas-title" class="project-name-suffix">Canvas</span>
  </div>

  <!-- CENTER -->
  <div class="header-center">
    
    <span id="project-iac-icon" aria-hidden="true" class="project-iac-icon"></span>
    <span id="project-name-prefix-display" class="project-name-prefix visually-hidden"></span>
    <span id="project-name-suffix-display" class="project-name-suffix" contenteditable="true" role="button" tabindex="0">Project Name</span>
  </div>

  <!-- RIGHT -->
  <div class="section right-tools">

    <button id="btn-export-diagram" class="icon-btn" title="Export Diagram" type="button">
      <img src="/Assets/Icons/export.png" class="icon" />
    </button>

    <button id="btn-validate" class="icon-btn" title="Validate" type="button">
      <img src="/Assets/Icons/validate.png" class="icon" />
    </button>

    <button id="btn-project-save" class="icon-btn" title="Save" type="button">
      <img src="/Assets/Icons/save.png" class="icon" />
    </button>

    <button id="btn-project-settings-template" class="icon-btn" title="Generate Code" type="button">
      <img src="/Assets/Icons/generate.png" class="icon" />
    </button>

    <button id="btn-project-settings" class="icon-btn" title="Project Settings" type="button">
      <img src="/Assets/Icons/settings.png" class="icon" />
    </button>

    <div class="reach-out-wrap">
      <button
        id="btn-reach-out"
        class="icon-btn"
        title="Reach Out"
        type="button"
        aria-haspopup="true"
        aria-expanded="false"
        aria-controls="reach-out-menu"
      >
        <img src="/Assets/Icons/faq.png" class="icon" />
      </button>

      <div id="reach-out-menu" class="reach-out-menu" hidden>
        <a
          class="reach-out-menu__item"
          href="https://mohit13.com/"
          target="_blank"
          rel="noopener noreferrer"
        >
          Visit Website
        </a>
        <a class="reach-out-menu__item" href="mailto:mohit13@outlook.com">
          Send Email
        </a>
      </div>
    </div>

    <button id="btn-back-projects" class="signin" type="button">Back to Projects</button>

  </div>
</div>

<!-- MAIN -->
<div class="main" id="workspace">

  <!-- LEFT PANEL -->
  <!-- Update Black status here --> 
  <div class="left-panel panel panel--left">
    <h3><img src="/Assets/Logo/azure-logo-small.png" class="left-title-icon" alt="Azure"/>Resources</h3>
    <input type="search" id="search-input" placeholder="Search resources" aria-label="Search resources" />
    <div class="resource-list" id="resource-list" aria-label="Resource list"></div>
    <div class="left-footer" aria-label="Resource footer">
      <div class="left-footer-inner">
        <a href="https://mohit13.com/" target="_blank" rel="noopener noreferrer" class="left-footer-link">
          <img src="/Assets/Logo/m13.png" class="left-footer-logo" alt="M13 logo" />
        </a>
      </div>
    </div>
  </div>

  <div class="splitter splitter--vertical" data-splitter="left" role="separator" aria-orientation="vertical" aria-label="Resize left panel"></div>

  <!-- CANVAS -->
  <div class="canvas-container panel panel--center">

    <div class="canvas-toolbar">

      <!-- LEFT -->
      <div class="toolbar-left">
            <div class="toolbar-controls">
              <button id="canvas-zoom-out" class="icon-btn" type="button">-</button>
              <span id="canvas-zoom-label">100%</span>
              <button id="canvas-zoom-in" class="icon-btn" type="button">+</button>
            </div>

            <button id="canvas-reset-view" class="signin reset-btn" type="button">Reset</button>
      </div>

      <!-- CENTER (single bounded system message) -->
      <div class="toolbar-center">
        <div id="center-status-boundary" class="center-status-boundary" role="status" aria-live="polite">
          <div id="center-system-message" class="message-feed"></div>
        </div>
      </div>

      <!-- RIGHT 
      <div class="toolbar-right">
        <span id="selected-resource-name" class="status-text"></span>
        <span id="status-left-width" class="visually-hidden"></span>
        <span id="status-right-width" class="visually-hidden"></span>
      </div>-->

    </div>

    <!-- CANVAS AREA -->
    <div class="canvas canvas-viewport" id="canvas-viewport" aria-label="Architecture canvas" tabindex="0">
      <div class="canvas-grid" id="canvas-grid"></div>
      <div class="canvas-layer" id="canvas-layer"></div>
      <svg class="canvas-edges" id="canvas-edges" aria-hidden="true"></svg>
    </div>

  </div>

  <div class="splitter splitter--vertical" data-splitter="right" role="separator" aria-orientation="vertical" aria-label="Resize right panel"></div>

  <!-- RIGHT PANEL -->
  <div class="right-panel panel panel--right">

    <div class="tabs right-panel-tabs" role="tablist" aria-label="Property, validation and AI architect">
      <div id="tab-properties" class="tab is-active" data-tab="properties" role="tab" tabindex="0" aria-selected="true" aria-controls="panel-properties">Properties</div>
      <div id="tab-chat" class="tab" data-tab="chat" role="tab" tabindex="-1" aria-selected="false" aria-controls="panel-chat">AI Architect</div>
      <div id="tab-tips" class="tab" data-tab="tips" role="tab" tabindex="-1" aria-selected="false" aria-controls="panel-tips">Validation</div>
    </div>

    <div class="tab-content">

      <div id="panel-properties" class="tab-pane tab-panel right-tab-panel" role="tabpanel" aria-labelledby="tab-properties">
        <div class="property-panel-header">
          <span id="selected-resource-name" class="prop-res-name">No selection</span>
        </div>
        <div id="property-content" class="property-content"></div>
      </div>

      <div id="panel-chat" class="tab-pane tab-panel right-tab-panel is-hidden" role="tabpanel" aria-labelledby="tab-chat" hidden>
        <div class="chat-agent-status" aria-live="polite">
          <span class="chat-agent-status__label">AI agent status:</span>
          <span id="chat-agent-status-value" class="chat-agent-status__value">Checking…</span>
        </div>
        <div class="chat-context-notice" id="chat-context-notice">
          <span class="chat-context-notice__icon">&#9432;</span>
          <span class="chat-context-notice__text">AI uses your <strong>project description</strong> as context.</span>
        </div>
        <div class="chat-history" id="chat-history" aria-live="polite">
          <div class="chat-welcome">
            <h3 class="chat-welcome-title">AI Architect ready</h3>
            <p class="chat-welcome-message">Ask me anything about your Azure architecture design.</p>
          </div>
        </div>
        <div class="chat-compose">
          <textarea id="chat-input" class="chat-input" placeholder="Ask about your architecture..." aria-label="Chat message" rows="2"></textarea>
          <button id="chat-send" class="btn btn--primary btn--sm" type="button" title="Send message (Enter)">Send</button>
        </div>
      </div>

      <div id="panel-tips" class="tab-pane tab-panel right-tab-panel is-hidden" role="tabpanel" aria-labelledby="tab-tips" hidden>
        <div id="tips-content" class="tips-content"></div>
      </div>

    </div>

  </div>

</div>

</div>

<script src="./CanvasScreen/canvas.js?v=20260330i"></script>
</body>
</html>
