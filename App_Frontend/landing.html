<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agentic Cloud Architect</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app" id="app">
      <div class="screen is-active" id="screen-projects">
        <div class="intro-container">
          <div class="intro-header">
            <h1>Agentic Cloud Architect</h1>
            <p>Design, build, and manage cloud infrastructure with AI assistance</p>
            <div class="intro-header-actions">
              <button type="button" class="btn btn--secondary" id="btn-app-settings" title="Configure Azure AI Foundry or Ollama models">Application Settings</button>
            </div>
          </div>

          <div class="intro-columns">
            <!-- Left Column: Select Project -->
            <div class="intro-column intro-column--select" data-section="select">
              <h2 class="column-title">Select Project</h2>
              <div class="cloud-sections">
                <!-- Azure Section -->
                <div class="cloud-section">
                  <button class="cloud-header" data-cloud="Azure" title="Expand/collapse Azure projects">
                    <img src="./icons/azure-icon.png" alt="Azure" class="cloud-icon" />
                    <span class="cloud-name">Azure</span>
                    <span class="collapse-indicator">▼</span>
                  </button>
                  <div class="cloud-projects" id="projects-azure"></div>
                </div>

                <!-- AWS Section -->
                <div class="cloud-section">
                  <button class="cloud-header" data-cloud="AWS" title="Expand/collapse AWS projects">
                    <img src="./icons/aws-icon.png" alt="AWS" class="cloud-icon" />
                    <span class="cloud-name">AWS</span>
                    <span class="collapse-indicator">▼</span>
                  </button>
                  <div class="cloud-projects" id="projects-aws"></div>
                </div>

                <!-- GCP Section -->
                <div class="cloud-section">
                  <button class="cloud-header" data-cloud="GCP" title="Expand/collapse GCP projects">
                    <img src="./icons/gcp-icon.png" alt="GCP" class="cloud-icon" />
                    <span class="cloud-name">GCP</span>
                    <span class="collapse-indicator">▼</span>
                  </button>
                    <span class="collapse-indicator">▼</span>
                  </button>
                  <div class="cloud-projects" id="projects-gcp"></div>
                </div>
              </div>
            </div>

            <!-- Right Column: Create Project -->
            <div class="intro-column intro-column--create" data-section="create">
              <h2 class="column-title">Create Project</h2>
              <form class="project-create-form">
                <div class="form-group">
                  <label for="intro-cloud">Cloud Provider</label>
                  <select id="intro-cloud" aria-label="Cloud provider">
                    <option value="">Select a cloud...</option>
                    <option value="Azure">Azure</option>
                    <option value="AWS">AWS</option>
                    <option value="GCP">GCP</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="intro-name">Project Name</label>
                  <div class="name-input-group">
                    <span id="intro-prefix" class="name-prefix">&lt;Cloud&gt;-</span>
                    <input type="text" id="intro-name" placeholder="project-name" aria-label="Project name suffix" maxlength="20" />
                  </div>
                  <small id="intro-name-hint" class="name-hint">Select cloud to lock prefix.</small>
                </div>
                <button type="button" class="btn btn--primary btn--block" id="btn-intro-create" title="Create a new cloud architecture project">Create Project</button>
                <div id="create-project-message" class="form-message" aria-live="polite"></div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="./landing.js"></script>
  </body>
</html>
