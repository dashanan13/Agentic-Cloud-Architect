<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

  <!-- HERO -->
  <div class="hero">
    <h1>Agentic Cloud Architect</h1>
    <p>Sign in to continue</p>
  </div>

  <!-- SIGN IN CARD -->
  <div class="card">

    <h2>Sign In</h2>

    <label>Email</label>
    <input type="email" placeholder="you@example.com">

    <label>Password</label>
    <input type="password" placeholder="Enter your password">

    <div class="row">
      <label class="checkbox">
        <input type="checkbox"> Remember me
      </label>

      <a href="#" class="link">Forgot password?</a>
    </div>

    <button class="primary full">Sign In</button>

    <div class="divider">
      <span>or</span>
    </div>

    <button class="secondary full">Continue with Microsoft</button>

    <p class="footer-text">
      Don’t have an account? <a href="#" class="link">Create one</a>
    </p>

  </div>

</div>

</body>
</html>
