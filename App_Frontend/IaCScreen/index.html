<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <base href="../" />
  <title>IaC Screen</title>
  <link rel="stylesheet" href="./IaCScreen/styles.css" />
</head>

<body>

<!-- HEADER -->
<div class="header">

  <div class="section">
    <a href="./index.html" class="app-home">
      <img src="./Assets/Logo/logo-icon.jpg" class="icon app-logo" alt="App logo" />
      <span class="visually-hidden">Home</span>
    </a>
  </div>

  <div class="header-center">
    IaC: <span id="iac-project-context">(Project)</span>
  </div>

  <div class="section right-tools">
    <button id="btn-iac-warning-mode" class="btn" type="button" aria-pressed="false">Warnings: Allowed</button>
    <button id="btn-iac-retry" class="btn" type="button" hidden disabled>Retry</button>
    <button id="btn-iac-back" class="btn" type="button">Back</button>
  </div>

</div>

<!-- MAIN -->
<div class="main">

  <!-- GENERATION -->
  <div class="generation-section">

    <div class="section-inner-rect iac-status is-idle" id="iac-status">

      <div class="iac-status__top">
        <p class="iac-status__text" id="iac-status-text">IaC status: waiting</p>
        <button id="btn-iac-status-toggle" class="iac-status__toggle" type="button" aria-expanded="true" aria-controls="iac-status-body" title="Collapse generation status">
          <span aria-hidden="true">▴</span>
        </button>
      </div>
      <p class="iac-status__meta visually-hidden" id="iac-status-meta">Task not started.</p>

      <div class="iac-status__progress">
        <div class="iac-progress__track">
          <div class="iac-progress__fill" id="iac-progress-fill"></div>
          <div class="iac-progress__milestones" id="iac-progress-milestones" aria-hidden="true"></div>
        </div>
      </div>

      <div class="generation-body iac-status__details" id="iac-status-body">
        <ul class="iac-stage-list" id="iac-stage-list" aria-label="IaC generation stages"></ul>
      </div>

    </div>

  </div>

  <!-- BOTTOM -->
  <div class="bottom-section">

    <div class="section-inner-rect section-inner-rect--bottom">

    <div class="tree-panel">
      <div class="panel-title">
        <span>Files</span>
        <div class="tree-actions">
          <button id="btn-iac-download" class="btn" type="button" disabled>Download</button>
        </div>
      </div>

      <div class="tree-content iac-file-list" id="iac-file-list">
      </div>
    </div>

    <div class="preview-panel">
      <div class="panel-title">
        <span id="iac-viewer-title">Preview</span>
        <div class="preview-actions">
          <button id="btn-iac-copy" class="btn" type="button" disabled>Copy</button>
        </div>
      </div>

      <pre class="preview-content iac-file-content is-empty" id="iac-file-content">
        Select a file to preview its content...
      </pre>
    </div>

    </div>

  </div>

</div>
<script src="./IaCScreen/iac.js?v=20260316a"></script>

</body>
</html>
