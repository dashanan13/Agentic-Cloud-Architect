<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agentic Cloud Architect - Project Settings</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app" id="app">
      <div class="screen is-active screen--project-settings" id="screen-settings">
        <header class="topbar">
          <div class="topbar__left">
            <span class="project-label project-label--strong">Project Settings</span>
            <span class="project-name-prefix-display" id="project-settings-context">(Project)</span>
          </div>
          <div class="topbar__right">
            <button id="btn-project-settings-back" class="btn btn--sm">Back</button>
          </div>
        </header>

        <main class="settings-layout">
          <section class="settings-panel">
            <div class="settings-content">
              <h2 id="project-settings-heading">Project Settings</h2>
              <p class="settings-subtitle">Configure project-specific settings.</p>

              <form id="project-settings-form" class="settings-form">
                <section class="settings-section">
                  <h3 class="settings-section-title">Project Configuration</h3>
                  <div class="form-group form-group--spaced">
                    <label for="ps-project-thread">Project Thread</label>
                    <input type="text" id="ps-project-thread" class="input-readonly" placeholder="Created on project load" readonly />
                  </div>
                  <div class="form-group">
                    <label for="ps-github-repo-url">GITHUB_REPO_URL</label>
                    <input type="url" id="ps-github-repo-url" placeholder="https://github.com/org/repo" autocomplete="off" />
                  </div>
                </section>
              </form>
            </div>

            <div class="settings-footer">
              <div id="project-settings-message" class="form-message" aria-live="polite"></div>
              <div class="settings-actions">
                <button id="btn-project-settings-save" class="btn btn--primary">Save Project Settings</button>
              </div>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script src="./project-settings.js"></script>
  </body>
</html>
