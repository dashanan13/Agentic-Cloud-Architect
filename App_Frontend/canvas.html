<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agentic Cloud Architect - Canvas</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app" id="app">
      <div class="screen is-active" id="screen-canvas">
        <header class="topbar">
          <div class="topbar__left">
            <span class="project-label project-label--strong">Project:</span>
            <span id="project-name-prefix-display" class="project-name-prefix-display"></span>
            <span id="project-name-suffix-display" class="project-name-display" contenteditable="true" role="button" tabindex="0"></span>
          </div>
          <div class="topbar__right">
            <span class="project-timestamp" id="project-timestamp"></span>
            <span id="project-save-status" class="project-save-status" aria-live="polite"></span>
            <button id="btn-project-save" class="btn btn--primary btn--sm">Save</button>
            <button id="btn-project-settings" class="btn btn--secondary btn--sm">Settings</button>
            <button id="btn-back-projects" class="btn btn--sm">Back to Projects</button>
          </div>
        </header>

        <main class="workspace" id="workspace">
        <section class="panel panel--left" aria-label="Resource browser">
          <div class="panel__header">
            <input type="search" id="search-input" placeholder="Search resources" aria-label="Search resources" />
          </div>
          <div class="resource-list" id="resource-list" aria-label="Resource list"></div>
          <aside class="panel-status" aria-label="Status messages">
            <div class="status-title">Status Messages</div>
            <ul>
              <li><span class="badge badge--info">INFO</span> Left panel width: <strong id="status-left-width">-</strong></li>
              <li><span class="badge badge--info">INFO</span> Right panel width: <strong id="status-right-width">-</strong></li>
            </ul>
          </aside>
        </section>

        <div class="splitter splitter--vertical" data-splitter="left" role="separator" aria-orientation="vertical" aria-label="Resize left panel"></div>

        <section class="panel panel--center" aria-label="Visual canvas">
          <div class="canvas-shell">
            <div class="canvas-toolbar" aria-label="Canvas controls">
              <button id="canvas-zoom-out" class="btn btn--sm" type="button" aria-label="Zoom out">−</button>
              <span id="canvas-zoom-label" class="canvas-zoom-label" aria-live="polite">100%</span>
              <button id="canvas-zoom-in" class="btn btn--sm" type="button" aria-label="Zoom in">+</button>
              <button id="canvas-reset-view" class="btn btn--sm" type="button">Reset View</button>
            </div>
            <div class="canvas-viewport" id="canvas-viewport" aria-label="Architecture canvas" tabindex="0">
              <div class="canvas-grid" id="canvas-grid"></div>
              <svg class="canvas-edges" id="canvas-edges" aria-hidden="true"></svg>
              <div class="canvas-layer" id="canvas-layer"></div>
            </div>
          </div>
        </section>

        <div class="splitter splitter--vertical" data-splitter="right" role="separator" aria-orientation="vertical" aria-label="Resize right panel"></div>

        <section class="panel panel--right" aria-label="Resource properties and chat">
          <div class="tabs right-panel-tabs" role="tablist" aria-label="Properties and chat">
            <div id="tab-properties" class="tab is-active" data-tab="properties" role="tab" tabindex="0" aria-selected="true" aria-controls="panel-properties">Properties</div>
            <div id="tab-chat" class="tab" data-tab="chat" role="tab" tabindex="-1" aria-selected="false" aria-controls="panel-chat">Chat</div>
          </div>

          <div class="tab-panel right-tab-panel" id="panel-properties" role="tabpanel" aria-labelledby="tab-properties">
            <div class="panel__header panel__header--stacked">
              <span class="muted">Selected Item</span>
              <strong id="selected-resource-name">None selected</strong>
            </div>
            <div class="property-content" id="property-content">
              Select a resource or connection to edit properties.
            </div>
          </div>

          <div class="tab-panel right-tab-panel is-hidden" id="panel-chat" role="tabpanel" aria-labelledby="tab-chat" hidden>
            <div class="chat-history" id="chat-history" aria-live="polite"></div>
            <div class="chat-compose">
              <textarea id="chat-input" class="chat-input" placeholder="Message" aria-label="Message"></textarea>
              <button id="chat-send" class="btn btn--primary btn--sm" type="button">Send</button>
            </div>
          </div>
        </section>

      </main>
      </div>
    </div>

    <script src="./canvas.js"></script>
  </body>
</html>
