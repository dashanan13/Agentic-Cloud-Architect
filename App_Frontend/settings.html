<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agentic Cloud Architect - Settings</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app" id="app">
      <div class="screen is-active" id="screen-settings">
        <header class="topbar">
          <div class="topbar__left">
            <span class="project-label project-label--strong">Settings</span>
            <span class="project-name-prefix-display" id="settings-context">(Application)</span>
          </div>
          <div class="topbar__right">
            <button id="btn-settings-back" class="btn btn--sm">Back</button>
          </div>
        </header>

        <main class="settings-layout">
          <section class="settings-panel">
            <div class="settings-content">
              <h2>Application Settings</h2>
              <p class="settings-subtitle">Configure models for Azure AI Foundry or local Ollama.</p>

              <form id="app-settings-form" class="settings-form">
                <div class="form-group">
                  <label for="as-model-provider">Model Provider</label>
                  <select id="as-model-provider">
                    <option value="azure-foundry">Azure AI Foundry</option>
                    <option value="ollama-local">Local (Ollama)</option>
                  </select>
                </div>

                <div id="as-foundry-fields" class="provider-fields">
                  <div class="form-group">
                    <label for="as-foundry-project-region">Foundry Project Region</label>
                    <input type="text" id="as-foundry-project-region" placeholder="eastus2" />
                  </div>

                  <div class="form-group">
                    <label for="as-foundry-endpoint">Foundry Endpoint</label>
                    <input type="text" id="as-foundry-endpoint" placeholder="https://your-project.services.ai.azure.com" />
                  </div>

                  <div class="form-group">
                    <label for="as-foundry-api-key">Foundry API Key</label>
                    <input type="password" id="as-foundry-api-key" placeholder="Enter API key" autocomplete="off" />
                  </div>

                  <div class="form-group">
                    <label for="as-foundry-api-version">Foundry API Version</label>
                    <input type="text" id="as-foundry-api-version" placeholder="2024-05-01-preview" />
                  </div>

                  <div class="form-group">
                    <label for="as-foundry-model-coding">Coding Model</label>
                    <input type="text" id="as-foundry-model-coding" placeholder="gpt-5-codex" />
                  </div>

                  <div class="form-group">
                    <label for="as-foundry-model-reasoning">Reasoning Model</label>
                    <input type="text" id="as-foundry-model-reasoning" placeholder="o4-mini" />
                  </div>

                  <div class="form-group">
                    <label for="as-foundry-model-fast">Fast Model</label>
                    <input type="text" id="as-foundry-model-fast" placeholder="gpt-4o-mini" />
                  </div>
                </div>

                <div id="as-ollama-fields" class="provider-fields is-hidden" hidden>
                  <div class="form-group">
                    <label for="as-ollama-base-url">Ollama Base URL</label>
                    <input type="text" id="as-ollama-base-url" placeholder="http://host.docker.internal:11434" />
                  </div>

                  <div class="form-group">
                    <label for="as-ollama-model-coding">Coding Model Path</label>
                    <input type="text" id="as-ollama-model-coding" placeholder="/models/coding-model.gguf" />
                  </div>

                  <div class="form-group">
                    <label for="as-ollama-model-reasoning">Reasoning Model Path</label>
                    <input type="text" id="as-ollama-model-reasoning" placeholder="/models/reasoning-model.gguf" />
                  </div>

                  <div class="form-group">
                    <label for="as-ollama-model-fast">Fast Model Path</label>
                    <input type="text" id="as-ollama-model-fast" placeholder="/models/fast-model.gguf" />
                  </div>
                </div>
              </form>
            </div>

            <div class="settings-footer">
              <div id="settings-message" class="form-message" aria-live="polite"></div>
              <div class="settings-actions">
                <button id="btn-settings-verify" class="btn">Verify</button>
                <button id="btn-settings-save" class="btn btn--primary">Save Settings</button>
              </div>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script src="./settings.js"></script>
  </body>
</html>
