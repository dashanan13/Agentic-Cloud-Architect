<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agentic Cloud Architect - Settings</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app" id="app">
      <div class="screen is-active" id="screen-settings">
        <header class="topbar">
          <div class="topbar__left">
            <span id="settings-page-title" class="project-label project-label--strong">Settings</span>
            <span class="project-name-prefix-display" id="settings-context">(Application)</span>
          </div>
          <div class="topbar__right">
            <button id="btn-settings-back" class="btn btn--sm" title="Return to previous screen">Back</button>
          </div>
        </header>

        <main class="settings-layout">
          <section class="settings-panel">
            <div class="settings-content">
              <h2 id="settings-heading">Application Settings</h2>
              <p id="settings-subtitle" class="settings-subtitle">Configure models for Azure AI Foundry or local Ollama.</p>

              <form id="app-settings-form" class="settings-form">
                <section class="settings-section">
                  <h3 class="settings-section-title">Azure App Registration Details</h3>
                  <div class="form-group">
                    <label for="as-azure-tenant-id">AZURE_TENANT_ID</label>
                    <input type="text" id="as-azure-tenant-id" placeholder="Microsoft Entra tenant ID" autocomplete="off" />
                  </div>

                  <div class="form-group">
                    <label for="as-azure-client-id">AZURE_CLIENT_ID</label>
                    <input type="text" id="as-azure-client-id" placeholder="App registration client ID" autocomplete="off" />
                  </div>

                  <div class="form-group">
                    <label for="as-azure-client-secret">AZURE_CLIENT_SECRET</label>
                    <input type="password" id="as-azure-client-secret" placeholder="App registration client secret" autocomplete="off" />
                  </div>

                </section>

                <section class="settings-section">
                  <h3 class="settings-section-title">Model Configuration</h3>
                  <div class="form-group">
                    <label for="as-model-provider">Model Provider</label>
                    <select id="as-model-provider">
                      <option value="azure-foundry">Azure AI Foundry</option>
                      <option value="ollama-local">Local (Ollama)</option>
                    </select>
                  </div>

                <div id="as-foundry-fields" class="provider-fields">

                  <div class="form-group">
                    <label for="as-azure-subscription-id">AZURE_SUBSCRIPTION_ID</label>
                    <input type="text" id="as-azure-subscription-id" placeholder="Azure subscription ID" autocomplete="off" />
                  </div>

                  <div class="form-group">
                    <label for="as-azure-resource-group">AZURE_RESOURCE_GROUP</label>
                    <input type="text" id="as-azure-resource-group" placeholder="Resource group name" autocomplete="off" />
                  </div>

                  <div class="form-group">
                    <label for="as-ai-foundry-project-name">AI_FOUNDRY_PROJECT_NAME</label>
                    <input type="text" id="as-ai-foundry-project-name" placeholder="Foundry project name" autocomplete="off" />
                  </div>

                  <div class="form-group">
                    <div class="label-row">
                      <label for="as-ai-foundry-endpoint">AI_FOUNDRY_ENDPOINT</label>
                      <span id="as-foundry-endpoint-status" class="status-icon" aria-hidden="true"></span>
                    </div>
                    <div class="input-row">
                      <input type="text" id="as-ai-foundry-endpoint" placeholder="https://your-project.services.ai.azure.com/api/projects/your-project" />
                    </div>
                  </div>

                  <div class="form-group">
                    <label for="as-foundry-app-agent">Application Agent</label>
                    <input type="text" id="as-foundry-app-agent" class="input-readonly" placeholder="Created on app load" readonly />
                  </div>

                  <div class="form-group">
                    <label for="as-foundry-app-thread">Application Thread</label>
                    <input type="text" id="as-foundry-app-thread" class="input-readonly" placeholder="Created on app load" readonly />
                  </div>

                  <div class="form-group">
                    <label for="as-foundry-model-coding">Coding Model</label>
                    <select id="as-foundry-model-coding">
                      <option value="">Select a model deployment</option>
                    </select>
                  </div>

                  <div class="form-group">
                    <label for="as-foundry-model-reasoning">Reasoning Model</label>
                    <select id="as-foundry-model-reasoning">
                      <option value="">Select a model deployment</option>
                    </select>
                  </div>

                  <div class="form-group">
                    <label for="as-foundry-model-fast">Fast Model</label>
                    <select id="as-foundry-model-fast">
                      <option value="">Select a model deployment</option>
                    </select>
                  </div>
                </div>

                <div id="as-ollama-fields" class="provider-fields is-hidden" hidden>
                  <div class="form-group">
                    <div class="label-row">
                      <label for="as-ollama-base-url">Ollama Base URL</label>
                      <span id="as-ollama-base-url-status" class="status-icon" aria-hidden="true"></span>
                    </div>
                    <div class="input-row">
                      <input type="text" id="as-ollama-base-url" placeholder="http://host.docker.internal:11434" />
                    </div>
                  </div>

                  <div class="form-group">
                    <label for="as-ollama-model-coding">Coding Model Path</label>
                    <select id="as-ollama-model-coding">
                      <option value="">Select a model</option>
                    </select>
                  </div>

                  <div class="form-group">
                    <label for="as-ollama-model-reasoning">Reasoning Model Path</label>
                    <select id="as-ollama-model-reasoning">
                      <option value="">Select a model</option>
                    </select>
                  </div>

                  <div class="form-group">
                    <label for="as-ollama-model-fast">Fast Model Path</label>
                    <select id="as-ollama-model-fast">
                      <option value="">Select a model</option>
                    </select>
                  </div>
                </div>
                </section>
              </form>

            </div>

            <div class="settings-footer">
              <div id="settings-message" class="form-message" aria-live="polite"></div>
              <div class="settings-actions">
                <button id="btn-settings-verify" class="btn btn--verify" title="Test connection to AI model provider">Verify connection</button>
                <button id="btn-settings-reset" class="btn btn--secondary" title="Reset all settings to default values">Reset</button>
                <button id="btn-settings-save" class="btn btn--primary" title="Save all application settings">Save Application Settings</button>
              </div>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script src="./settings.js"></script>
  </body>
</html>
