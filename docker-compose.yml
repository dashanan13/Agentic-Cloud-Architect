services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: a3-app
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_KEY=${AZURE_OPENAI_KEY:-}
    volumes:
      - ./App_State:/workspace/App_State
      - ./Projects:/workspace/Projects
